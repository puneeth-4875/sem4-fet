<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Calculator</title>
    <style>
        body {
            background-color: #1a2639;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d2ff;
            width: 100%;
            padding-bottom: 20px;
        }

        h1 {
            color: #00d2ff;
            font-size: 2.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .circle-icon {
            width: 30px;
            height: 30px;
            border: 5px solid #ff4b2b;
            border-radius: 50%;
        }

        .card {
            background-color: #25334a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        input {
            width: 80%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #fff;
            color: #333;
            font-weight: bold;
        }

        #result-container {
            border: 2px solid #00d2ff;
            border-radius: 8px;
            padding: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d2ff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Circle Calculator <div class="circle-icon"></div></h1>
        <p>Calculate Area and Circumference</p>
    </div>

    <div class="card">
        <label for="radius">Enter Radius</label>
        <input type="number" id="radius" placeholder="e.g. 5">
        
        <div class="btn-group">
            <button onclick="calculate('area')">Calculate Area</button>
            <button onclick="calculate('circumference')">Calculate Circumference</button>
        </div>

        <div id="result-container">
            <span id="result-text">Result will appear here...</span>
        </div>
    </div>

    <script>
        function calculate(type) {
            const r = document.getElementById('radius').value;
            const display = document.getElementById('result-text');

            if (!r || r <= 0) {
                display.innerText = "Please enter a valid radius";
                return;
            }

            if (type === 'area') {
                const area = Math.PI * Math.pow(r, 2);
                display.innerText = `Area: ${area.toFixed(2)}`;
            } else {
                const circ = 2 * Math.PI * r;
                display.innerText = `Circumference: ${circ.toFixed(2)}`;
            }
        }
    </script>
</body>
</html>
