<!DOCTYPE html>
<html lang="en"> 
  <head> 
    <meta charset="UTF-8"> 
    <title>OL and UL</title> 
    <title>Skill Matrix</title>
    <style>
        body  .container {
            background-color: yellow;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;  }        
       h1 {
            color: #2e7d32;
            text-transform: uppercase;
            border-bottom: 2px solid #2e7d32;
            padding-bottom:10px ;
            margin-top: 0;
            font-size: 1.5rem;
        }
        ol > li {
            counter-increment: skill-counter;
            margin-bottom: 20px;
            font-weight: bold;
            color: #1b5e20;
            font-size: 1.1rem;
        }       
        ul {
            list-style-type: none;
            padding-left: 20px;
            margin-top: 8px;
        }
         ul li {
            font-weight: normal;
            color: #555;
            padding: 5px 0;
            position: relative;
        }
         ul li::before {
            content: "•";
            color: #81c784;
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: -1em;
        }   
    </style>
  </head> 
  <body> 
    <div class="container">
        <h1>My Lists </h1>
        <ol> 
          <li>Frontend Development 
            <ul> 
                <li>HTML</li>
                <li>CSS</li> 
                <li>JavaScript</li> 
            </ul> 
          </li> 
          <li>Tools 
            <ul> 
                <li>Git</li> 
                <li>GitHub</li> 
                <li>VS Code</li> 
            </ul> 
          </li> 
        </ol> 
    </div>
  </body> 
</html>
